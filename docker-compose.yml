version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: nadc-helpdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nadc
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nadc_secure_password_change_me}
      POSTGRES_DB: nadc_helpdesk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nadc -d nadc_helpdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NADC Helpdesk Application
  app:
    build: .
    container_name: nadc-helpdesk-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://nadc:${DB_PASSWORD:-nadc_secure_password_change_me}@db:5432/nadc_helpdesk
      NODE_ENV: production
      PORT: 3001
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3001}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_64_char_random_string}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_to_another_64_char_random_string}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      # Optional - Email (configure if needed)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - uploads_data:/app/server/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
