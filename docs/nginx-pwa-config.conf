# PWA Configuration for NADC Helpdesk
# Add these location blocks to your existing nginx server block
# at /etc/nginx/sites-available/nadc-helpdesk

# Service Worker - must be served with correct header
location = /sw.js {
    root /var/www/nadc-helpdesk/client/dist;
    add_header Service-Worker-Allowed /;
    add_header Cache-Control "no-cache";
    default_type application/javascript;
}

# Manifest file - must have correct MIME type
location = /manifest.json {
    root /var/www/nadc-helpdesk/client/dist;
    add_header Content-Type application/manifest+json;
    add_header Cache-Control "public, max-age=86400";
}

# PWA Icons - cache for longer
location ~* ^/(icon-\d+\.png)$ {
    root /var/www/nadc-helpdesk/client/dist;
    add_header Cache-Control "public, max-age=604800";
}
