<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We're Sorry</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #F8F9FA;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      max-width: 520px;
      width: 100%;
      padding: 48px 32px;
    }
    h1 {
      color: #1B2A4A;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }
    .message {
      color: #6B7280;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      color: #374151;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      padding: 16px;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      resize: vertical;
      min-height: 120px;
      transition: border-color 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #1B2A4A;
    }
    textarea::placeholder {
      color: #9CA3AF;
    }
    .submit-button {
      display: block;
      width: 100%;
      padding: 16px 32px;
      background: #1B2A4A;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .submit-button:hover {
      background: #2d3f66;
      transform: translateY(-1px);
    }
    .submit-button:disabled {
      background: #9CA3AF;
      cursor: not-allowed;
      transform: none;
    }
    .footer {
      margin-top: 32px;
      color: #9CA3AF;
      font-size: 14px;
      text-align: center;
    }
    .success-message {
      display: none;
      text-align: center;
      padding: 24px;
    }
    .success-message.show {
      display: block;
    }
    .success-message h2 {
      color: #15803D;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .success-message p {
      color: #6B7280;
      font-size: 16px;
    }
    .form-content.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="form-content" id="formContent">
      <h1>We're sorry to hear that, {{requester_name}}.</h1>

      <p class="message">
        Could you tell us a bit more about what happened? Your feedback helps us improve.
      </p>

      <form id="feedbackForm" action="{{helpdesk_url}}/api/satisfaction/{{ticket_number}}/feedback" method="POST">
        <input type="hidden" name="token" value="{{feedback_token}}">

        <div class="form-group">
          <label for="feedback">Your feedback</label>
          <textarea
            id="feedback"
            name="feedback"
            placeholder="Please share what went wrong or how we can do better..."
            required
          ></textarea>
        </div>

        <button type="submit" class="submit-button" id="submitButton">
          Submit Feedback
        </button>
      </form>
    </div>

    <div class="success-message" id="successMessage">
      <h2>Thank you for your feedback</h2>
      <p>We appreciate you taking the time to help us improve. We'll review your feedback carefully.</p>
    </div>

    <p class="footer">{{company_name}}</p>
  </div>

  <script>
    document.getElementById('feedbackForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const button = document.getElementById('submitButton');
      const formContent = document.getElementById('formContent');
      const successMessage = document.getElementById('successMessage');
      const feedback = document.getElementById('feedback').value;

      button.disabled = true;
      button.textContent = 'Submitting...';

      try {
        const response = await fetch(this.action, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            token: this.querySelector('[name="token"]').value,
            feedback: feedback
          }),
        });

        if (response.ok) {
          formContent.classList.add('hidden');
          successMessage.classList.add('show');
        } else {
          throw new Error('Failed to submit feedback');
        }
      } catch (error) {
        button.disabled = false;
        button.textContent = 'Submit Feedback';
        alert('There was an error submitting your feedback. Please try again.');
      }
    });
  </script>
</body>
</html>
