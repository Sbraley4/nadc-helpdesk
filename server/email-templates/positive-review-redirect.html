<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #F8F9FA;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      max-width: 480px;
      width: 100%;
      text-align: center;
      padding: 48px 32px;
    }
    .checkmark {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #22C55E 0%, #15803D 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
    }
    .checkmark svg {
      width: 40px;
      height: 40px;
      color: white;
    }
    h1 {
      color: #1B2A4A;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .message {
      color: #6B7280;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .google-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .google-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.4);
    }
    .footer {
      margin-top: 32px;
      color: #9CA3AF;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkmark">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
      </svg>
    </div>

    <h1>Thanks {{requester_name}}!</h1>

    <p class="message">
      We're glad we could help. &#128522;<br><br>
      If you have a moment, we'd really appreciate a quick Google review &mdash; it helps our small team a lot and only takes 30 seconds:
    </p>

    <a href="{{google_review_url}}" target="_blank" class="google-button">
      <span>&#11088;</span>
      Leave us a Google Review
    </a>

    <p class="footer">{{company_name}}</p>
  </div>
</body>
</html>
