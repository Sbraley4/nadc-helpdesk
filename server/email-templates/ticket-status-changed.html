<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Status Updated</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background-color: #F8F9FA;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #F8F9FA;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width: 600px; width: 100%;">
          <!-- Header -->
          <tr>
            <td style="background-color: #1B2A4A; padding: 24px 32px; border-radius: 8px 8px 0 0;">
              <h1 style="margin: 0; color: #ffffff; font-size: 24px; font-weight: 600;">{{company_name}}</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background-color: #ffffff; padding: 32px;">
              <p style="margin: 0 0 16px 0; color: #374151; font-size: 16px; line-height: 1.6;">
                Hi {{requester_name}},
              </p>

              <p style="margin: 0 0 24px 0; color: #374151; font-size: 16px; line-height: 1.6;">
                Your ticket <strong>#{{ticket_number}}</strong> status has been updated.
              </p>

              <p style="margin: 0 0 8px 0; color: #6B7280; font-size: 14px;">
                {{ticket_subject}}
              </p>

              <!-- Status Change Display -->
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin: 24px 0;">
                <tr>
                  <td style="padding: 10px 16px; background-color: #FEF3C7; color: #92400E; font-size: 14px; font-weight: 600; border-radius: 6px;">
                    {{old_status}}
                  </td>
                  <td style="padding: 0 16px; color: #9CA3AF; font-size: 20px;">
                    &rarr;
                  </td>
                  <td style="padding: 10px 16px; background-color: #D1FAE5; color: #065F46; font-size: 14px; font-weight: 600; border-radius: 6px;">
                    {{new_status}}
                  </td>
                </tr>
              </table>

              <!-- CTA Button -->
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin: 24px 0;">
                <tr>
                  <td style="border-radius: 6px; background-color: #1B2A4A;">
                    <a href="{{ticket_url}}" target="_blank" style="display: inline-block; padding: 14px 28px; color: #ffffff; text-decoration: none; font-size: 16px; font-weight: 600;">View Ticket</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color: #F8F9FA; padding: 24px 32px; border-radius: 0 0 8px 8px; border-top: 1px solid #E5E7EB;">
              <p style="margin: 0 0 8px 0; color: #6B7280; font-size: 14px;">
                {{company_name}} Support Team
              </p>
              <p style="margin: 0; color: #9CA3AF; font-size: 12px;">
                Reply to this email to add a comment to your ticket.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
